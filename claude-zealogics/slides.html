<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>副業請的第一位員工不是人</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Noto+Serif+TC:wght@300;400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../tokens.css" />
  <link rel="stylesheet" href="../template/slide.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>

  <!-- ═══════════ 1. COVER ═══════════ -->
  <div class="slide-group">
    <p class="slide-label">1 — Cover</p>
    <div class="slide-wrap">
      <div class="slide slide--dark cover on-dark">
        <div class="cover__bg">
          <img src="assets/cover.png" alt="cover" />
        </div>
        <div class="inner">
          <div class="cover__top">
            <span class="t-handle on-dark">@Zealogics</span>
          </div>
          <div class="cover__title-block">
            <h1 class="t-cover-title on-dark">副業請的第一位員工不是人</h1>
            <p class="t-cover-sub on-dark">我怎麼調教 Claude 讓他好好聽話</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════ 2. AGENDA ═══════════ -->
  <div class="slide-group">
    <p class="slide-label">2 — Agenda</p>
    <div class="slide-wrap">
      <div class="slide slide--light on-light">
        <div class="inner">
          <div class="page-header">
            <h2 class="t-agenda-title on-light">Agenda</h2>
          </div>
          <ul class="agenda-list">
            <li class="agenda-item">
              <span class="agenda-item__num">01</span>
              <span class="agenda-item__star">✦</span>
              <span class="t-agenda-text on-light">第一次當慣老闆就上手</span>
            </li>
            <!-- 更多章節陸續加入 -->
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════ 3. SECTION DIVIDER — Part 1 ═══════════ -->
  <div class="slide-group">
    <p class="slide-label">3 — Section Divider · Part 1</p>
    <div class="slide-wrap">
      <div class="slide slide--dark section-divider on-dark">
        <div class="inner">
          <div class="section-divider__row">
            <span class="t-section-num">Part 1</span>
            <div class="section-divider__line"></div>
          </div>
          <h2 class="t-section-title on-dark">第一次當慣老闆就上手</h2>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════ 內容投影片 — Part 1（待填入）═══════════ -->

  <script>lucide.createIcons();</script>
</body>
</html>
